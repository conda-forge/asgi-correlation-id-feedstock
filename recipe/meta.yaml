{% set name = "asgi-correlation-id" %}
{% set version = "4.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/asgi_correlation_id-{{ version }}.tar.gz
  sha256: 25d89b52f3d32c0f3b4915a9fc38d9cffc7395960d05910bdce5c13023dc237b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry >=0.12
  run:
    - python >={{ python_min }},<4.0
    - starlette >=0.18

test:
  imports:
    - asgi_correlation_id
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/snok/asgi-correlation-id
  summary: Middleware correlating project logs to individual requests
  license: BSD-4-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sondrelg
    - ludaavics
